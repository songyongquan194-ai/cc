name: Build macOS

# 在 macOS runner 上产出未签名的 .dmg / .zip 安装包（本机为 Windows，无法本地出 mac 包）。
on:
  workflow_dispatch: {}
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (platform profile)
        run: npx vitest run src/main/core/platform

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package macOS (unsigned)
        # 关闭自动签名/公证，产出未签名包。
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: cdrivecleaner-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
